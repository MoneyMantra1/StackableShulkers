name: Build Stackable Shulker Automation

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Build Stackable Shulker Automation
        run: gradle clean build --no-daemon --stacktrace

      - name: Upload Stackable Shulker Automation jar
        uses: actions/upload-artifact@v4
        with:
          name: StackableShulkerAutomation-NeoForge-1.21.1
          path: |
            build/libs/*.jar
          if-no-files-found: error
